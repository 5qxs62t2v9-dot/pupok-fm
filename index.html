<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Пупок FM</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Пупок FM">
    <meta name="theme-color" id="theme-color-meta" content="#b8a9d2">
    
    <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512x512.png">
    <link rel="apple-touch-icon" href="icons/icon-512x512.png">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/icon-96x96.png">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="shortcut icon" href="favicon.ico">
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        /* ---------- СБРОС И БАЗА ---------- */
        html, body {
            overscroll-behavior: none;
            overflow: hidden;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            --bg-gradient-start: #f3e8fd;
            --bg-gradient-end: #e2d9f0;
            --container-bg: rgba(245, 240, 250, 0.8);
            --text-primary: #2e1a47;
            --text-secondary: #4a2e62;
            --text-muted: #7a6a8a;
            --accent: #9b7bc1;
            --accent-light: #bda0dc;
            --card-bg: rgba(255, 245, 255, 0.6);
            --card-border: rgba(255, 250, 255, 0.7);
            --shadow: 0 25px 40px -20px rgba(90, 40, 120, 0.15);
            --delete-color: #e57373;
            --slider-track: rgba(160, 130, 200, 0.2);
            --slider-thumb: #ffffff;
            --scroll-thumb: #c2addb;
            --scroll-track: #ede4f5;
            --icon-bg: #ffffffd0;
            --panel-bg: rgba(250, 245, 255, 0.8);
            --control-btn-bg: var(--icon-bg);
            --control-btn-color: var(--accent);
            --panel-separator: rgba(130, 100, 160, 0.1);
            --modal-overlay: rgba(30, 10, 40, 0.3);
            --checkbox-border: #9b7bc1;
            
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 0.2s, color 0.2s;
        }

        body.dark {
            --bg-gradient-start: #1e1528;
            --bg-gradient-end: #2a1f36;
            --container-bg: rgba(30, 20, 40, 0.95);
            --text-primary: #ede4f7;
            --text-secondary: #d2c4e0;
            --text-muted: #b09bc0;
            --accent: #b494d9;
            --accent-light: #d2b8ed;
            --card-bg: rgba(50, 35, 65, 0.7);
            --card-border: rgba(255, 245, 255, 0.08);
            --shadow: 0 25px 40px -20px rgba(0,0,0,0.5);
            --delete-color: #f49797;
            --slider-track: rgba(200, 170, 220, 0.2);
            --slider-thumb: #e8d9f2;
            --scroll-thumb: #9b7bc1;
            --scroll-track: #3e2c4a;
            --icon-bg: #372b45;
            --panel-bg: rgba(40, 25, 55, 0.9);
            --control-btn-bg: #3d2d50;
            --control-btn-color: #c7b0e0;
            --panel-separator: rgba(220, 190, 250, 0.15);
            --modal-overlay: rgba(10, 5, 15, 0.5);
            --checkbox-border: #c7b0e0;
        }

        /* ---------- ОСНОВНОЙ КОНТЕЙНЕР ---------- */
        .player-container {
            width: 100%;
            height: 100vh;
            background: var(--container-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: var(--shadow);
            padding: max(24px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom)) 16px;
            display: flex;
            flex-direction: column;
            border-radius: 36px;
            overflow: hidden;
        }

        /* ---------- ХЭДЕР ---------- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 0 4px;
            flex-shrink: 0;
        }

        .theme-toggle, .upload-btn {
            background: var(--icon-bg);
            width: 48px;
            height: 48px;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.03);
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            color: var(--accent);
            font-size: 22px;
            flex-shrink: 0;
            backdrop-filter: blur(5px);
        }

        .theme-toggle:active, .upload-btn:active {
            transform: scale(0.94);
            background: var(--card-bg);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            text-align: center;
            flex: 1;
        }

        #file-input {
            display: none;
        }

        /* ---------- ПОИСК + УПРАВЛЕНИЕ ---------- */
        .search-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .search-panel {
            background: var(--panel-bg);
            border-radius: 40px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: none;
            backdrop-filter: blur(5px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            flex: 1;
            min-width: 0;
        }

        .search-panel i {
            color: var(--accent);
            font-size: 18px;
            opacity: 0.9;
        }

        #search-input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            font-size: 17px;
            color: var(--text-primary);
        }

        #search-input::placeholder {
            color: var(--text-muted);
        }

        .playback-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .control-btn {
            background: var(--control-btn-bg);
            width: 48px;
            height: 48px;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
            border: none;
            color: var(--control-btn-color);
            font-size: 22px;
            backdrop-filter: blur(5px);
        }

        .control-btn:active {
            transform: scale(0.92);
        }

        .control-btn.active {
            background: var(--accent);
            color: white;
        }

        .control-btn.repeat-one {
            position: relative;
        }
        .control-btn.repeat-one::after {
            content: '1';
            position: absolute;
            font-size: 12px;
            font-weight: bold;
            bottom: 4px;
            right: 8px;
            color: currentColor;
        }

        /* ---------- ПАНЕЛЬ ПЛЕЙЛИСТА (основная) ---------- */
        .playlist-panel {
            background: var(--panel-bg);
            border-radius: 36px;
            padding: 18px 0 18px 14px;
            border: none;
            backdrop-filter: blur(5px);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .playlist-content {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--scroll-thumb) var(--scroll-track);
            -webkit-overflow-scrolling: touch;
            padding-right: 6px;
        }

        .playlist-content::-webkit-scrollbar {
            width: 6px;
        }
        .playlist-content::-webkit-scrollbar-track {
            background: var(--scroll-track);
            border-radius: 10px;
        }
        .playlist-content::-webkit-scrollbar-thumb {
            background: var(--scroll-thumb);
            border-radius: 10px;
        }

        .empty-message {
            text-align: center;
            padding: 40px 20px;
            margin-right: 12px;
            color: var(--text-muted);
            font-size: 18px;
            font-weight: 500;
        }

        /* ---------- ЭЛЕМЕНТ ТРЕКА ---------- */
        .track-item {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 12px;
            margin-right: 8px;
            border: none;
            backdrop-filter: blur(5px);
        }

        .track-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .action-left {
            width: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .delete-btn, .confirm-btn, .cancel-btn {
            width: 40px;
            height: 40px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--icon-bg);
            cursor: pointer;
            transition: 0.1s;
            border: none;
            font-size: 18px;
        }

        .delete-btn { color: var(--delete-color); }
        .delete-btn:active, .confirm-btn:active, .cancel-btn:active { transform: scale(0.9); }
        .confirm-btn { color: #6fcf97; }
        .cancel-btn { color: var(--delete-color); }

        .track-info {
            flex: 1;
            min-width: 0;
        }

        .track-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 16px;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ----- ПРОГРЕСС-БАР ----- */
        .progress-slider {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: transparent;
            cursor: pointer;
            position: relative;
        }

        .progress-slider:focus {
            outline: none;
        }

        .progress-slider::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: var(--slider-track);
            border-radius: 20px;
        }

        .progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 18px;
            background: var(--slider-thumb);
            box-shadow: 0 2px 10px rgba(155, 123, 193, 0.5);
            border: 2px solid var(--accent);
            margin-top: -6px;
            position: relative;
            z-index: 2;
        }

        .progress-slider {
            background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--fill-percent, 0%), transparent var(--fill-percent, 0%));
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: left center;
            border-radius: 20px;
        }

        .play-pause-btn {
            color: var(--accent);
            font-size: 24px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 32px;
            background: var(--icon-bg);
            box-shadow: 0 6px 12px rgba(155, 123, 193, 0.15);
            cursor: pointer;
            flex-shrink: 0;
            border: none;
            backdrop-filter: blur(5px);
        }

        .play-pause-btn:active { transform: scale(0.92); }
        .play-pause-btn.playing {
            color: white;
            background: var(--accent);
        }

        .hidden { display: none !important; }

        /* ---------- МОДАЛЬНОЕ ОКНО ПЛЕЙЛИСТОВ ---------- */
        .playlists-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--container-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            padding: max(24px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom)) 16px;
        }

        .playlists-modal.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .playlists-panel {
            background: transparent;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .panel-header h2 {
            flex: 1;
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .close-panel-btn, .back-btn {
            background: var(--icon-bg);
            width: 48px;
            height: 48px;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: var(--accent);
            font-size: 22px;
            backdrop-filter: blur(5px);
        }

        .playlist-search {
            margin-bottom: 16px;
            background: var(--panel-bg);
            border-radius: 40px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(5px);
        }
        .playlist-search i { color: var(--accent); font-size: 18px; }
        .playlist-search input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            color: var(--text-primary);
            font-size: 17px;
        }
        .playlist-search input::placeholder { color: var(--text-muted); }

        .create-playlist-btn, .add-tracks-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(5px);
        }
        .create-playlist-btn:active, .add-tracks-btn:active { opacity: 0.8; }

        .playlist-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--scroll-thumb) var(--scroll-track);
            background: var(--panel-bg);
            border-radius: 36px;
            padding: 16px 8px 16px 16px;
            margin-top: 8px;
        }
        .playlist-list::-webkit-scrollbar { width: 6px; }
        .playlist-list::-webkit-scrollbar-track { background: var(--scroll-track); border-radius: 10px; }
        .playlist-list::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 10px; }

        .playlist-item {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 16px 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(5px);
        }
        .playlist-info {
            flex: 1;
            font-weight: 600;
            font-size: 18px;
            color: var(--text-primary);
        }
        .playlist-actions {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            background: var(--icon-bg);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: var(--accent);
            font-size: 18px;
        }

        /* панель управления в деталях плейлиста */
        .playlist-detail-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        /* Окно выбора треков */
        .track-selector-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--container-bg);
            backdrop-filter: blur(25px);
            z-index: 1100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            padding: max(24px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom)) 16px;
            transition: opacity 0.2s;
        }
        .track-selector-modal.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .selector-panel {
            background: var(--panel-bg);
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            border-radius: 36px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(5px);
        }
        .selector-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .selector-header h3 {
            color: var(--text-primary);
            font-size: 22px;
        }
        .selector-list {
            overflow-y: auto;
            max-height: 60vh;
        }
        .selector-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--card-bg);
            border-radius: 24px;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .selector-item input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 26px;
            height: 26px;
            border-radius: 26px;
            border: 2px solid var(--checkbox-border);
            background: transparent;
            cursor: pointer;
            transition: 0.1s;
            flex-shrink: 0;
        }
        .selector-item input[type="checkbox"]:checked {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: inset 0 0 0 4px var(--panel-bg);
        }
        .selector-item label {
            flex: 1;
            font-size: 16px;
            color: var(--text-primary);
        }

        /* Кастомный диалог подтверждения */
        .custom-prompt-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .custom-prompt {
            background: var(--container-bg);
            padding: 24px;
            border-radius: 36px;
            width: 90%;
            max-width: 400px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .custom-prompt input {
            width: 100%;
            padding: 16px;
            border-radius: 30px;
            border: none;
            background: var(--panel-bg);
            color: var(--text-primary);
            font-size: 18px;
            margin: 16px 0;
            outline: none;
        }
        .prompt-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .prompt-btn {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            font-size: 17px;
            cursor: pointer;
        }
        .prompt-btn.cancel { background: var(--icon-bg); color: var(--delete-color); }
        .prompt-btn.confirm { background: var(--accent); color: white; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="player-container">
    <div class="header">
        <div class="theme-toggle" id="theme-toggle"><i class="fas fa-sun"></i></div>
        <h1>Пупок FM</h1>
        <label for="file-input" class="upload-btn"><i class="fas fa-plus"></i></label>
        <input type="file" id="file-input" accept=".mp3,.flac,audio/mpeg,audio/flac" multiple>
    </div>

    <div class="search-row">
        <div class="search-panel">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Поиск" autocomplete="off">
        </div>
        <div class="playback-controls">
            <div class="control-btn" id="playlists-btn" title="Плейлисты"><i class="fas fa-folder-open"></i></div>
            <div class="control-btn" id="autoplay-btn" title="Автовоспроизведение"><i class="fas fa-play-circle"></i></div>
            <div class="control-btn" id="repeat-btn" title="Режим повтора"><i class="fas fa-repeat"></i></div>
        </div>
    </div>

    <div class="playlist-panel">
        <div class="playlist-content" id="playlist-content">
            <div id="playlist"></div>
            <div id="empty-message" class="empty-message">🎵 Плейлист пуст</div>
        </div>
    </div>
</div>

<!-- Модалка плейлистов -->
<div class="playlists-modal" id="playlists-modal">
    <div class="playlists-panel" id="playlists-panel"></div>
</div>

<!-- Модалка выбора треков -->
<div class="track-selector-modal" id="track-selector-modal">
    <div class="selector-panel">
        <div class="selector-header">
            <h3>Выберите треки</h3>
            <div style="display: flex; gap: 10px;">
                <button class="icon-btn" id="selector-cancel"><i class="fas fa-times"></i></button>
                <button class="icon-btn" id="selector-confirm"><i class="fas fa-check"></i></button>
            </div>
        </div>
        <div class="selector-list" id="selector-list"></div>
    </div>
</div>

<audio id="global-audio" style="display: none;"></audio>

<script>
    (function(){
        "use strict";

        // ---------- SERVICE WORKER ----------
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(console.error);
            });
        }

        // ---------- БАЗА ДАННЫХ ----------
        const DB_NAME = 'PupokFMDB';
        const DB_VERSION = 3;
        let db = null;

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => { db = request.result; resolve(db); };
                request.onupgradeneeded = (evt) => {
                    const db = evt.target.result;
                    if (!db.objectStoreNames.contains('tracks')) {
                        db.createObjectStore('tracks', { keyPath: 'id' });
                    }
                    if (!db.objectStoreNames.contains('playlists')) {
                        const plStore = db.createObjectStore('playlists', { keyPath: 'id' });
                        plStore.createIndex('by_name', 'name');
                    }
                    if (!db.objectStoreNames.contains('playlistTracks')) {
                        const ptStore = db.createObjectStore('playlistTracks', { keyPath: 'id', autoIncrement: true });
                        ptStore.createIndex('playlistId', 'playlistId');
                        ptStore.createIndex('trackId', 'trackId');
                    }
                };
            });
        }

        // ---------- ТЕМА ----------
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = themeToggle.querySelector('i');
        let currentTheme = localStorage.getItem('pupokTheme') || 'system';
        function applyTheme() {
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            let isDark = currentTheme === 'dark' || (currentTheme === 'system' && systemDark);
            document.body.classList.toggle('dark', isDark);
            themeIcon.className = currentTheme === 'light' ? 'fas fa-sun' : (currentTheme === 'dark' ? 'fas fa-moon' : 'fas fa-circle-half-stroke');
            document.getElementById('theme-color-meta').setAttribute('content', isDark ? '#1e1528' : '#b8a9d2');
        }
        themeToggle.addEventListener('click', () => {
            if (currentTheme === 'light') currentTheme = 'dark';
            else if (currentTheme === 'dark') currentTheme = 'system';
            else currentTheme = 'light';
            localStorage.setItem('pupokTheme', currentTheme);
            applyTheme();
        });
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);

        // ---------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------
        const audio = document.getElementById('global-audio');
        const playlistEl = document.getElementById('playlist');
        const emptyMsg = document.getElementById('empty-message');
        const fileInput = document.getElementById('file-input');
        const searchInput = document.getElementById('search-input');
        const autoplayBtn = document.getElementById('autoplay-btn');
        const repeatBtn = document.getElementById('repeat-btn');
        const playlistsBtn = document.getElementById('playlists-btn');
        const modal = document.getElementById('playlists-modal');
        const panelContainer = document.getElementById('playlists-panel');
        const selectorModal = document.getElementById('track-selector-modal');
        const selectorList = document.getElementById('selector-list');
        const selectorCancel = document.getElementById('selector-cancel');
        const selectorConfirm = document.getElementById('selector-confirm');

        let autoplayEnabled = localStorage.getItem('autoplay') === 'true';
        let repeatMode = parseInt(localStorage.getItem('repeatMode') || '0');
        const tracksMap = new Map();
        let activeTrackId = null;
        let currentPlaylistId = null;
        let pendingAddToPlaylistId = null;

        // ---------- КАСТОМНЫЙ ПРОМПТ ----------
        function customPrompt(title, defaultValue = '') {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'custom-prompt-overlay';
                overlay.innerHTML = `
                    <div class="custom-prompt">
                        <h3 style="color: var(--text-primary); margin-bottom: 8px; font-size: 20px;">${title}</h3>
                        <input type="text" id="prompt-input" value="${defaultValue}" autofocus>
                        <div class="prompt-buttons">
                            <button class="prompt-btn cancel">Отмена</button>
                            <button class="prompt-btn confirm">ОК</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);
                const input = overlay.querySelector('#prompt-input');
                input.focus();
                overlay.querySelector('.cancel').addEventListener('click', () => {
                    document.body.removeChild(overlay);
                    resolve(null);
                });
                overlay.querySelector('.confirm').addEventListener('click', () => {
                    const val = input.value.trim();
                    document.body.removeChild(overlay);
                    resolve(val || null);
                });
                input.addEventListener('keypress', (e) => { if(e.key==='Enter') overlay.querySelector('.confirm').click(); });
                overlay.addEventListener('click', (e) => { if(e.target===overlay) overlay.querySelector('.cancel').click(); });
            });
        }

        function customConfirm(message) {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'custom-prompt-overlay';
                overlay.innerHTML = `
                    <div class="custom-prompt">
                        <h3 style="color: var(--text-primary); margin-bottom: 20px; font-size: 20px;">${message}</h3>
                        <div class="prompt-buttons">
                            <button class="prompt-btn cancel">Отмена</button>
                            <button class="prompt-btn confirm">Да</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);
                overlay.querySelector('.cancel').addEventListener('click', () => { document.body.removeChild(overlay); resolve(false); });
                overlay.querySelector('.confirm').addEventListener('click', () => { document.body.removeChild(overlay); resolve(true); });
                overlay.addEventListener('click', (e) => { if(e.target===overlay) overlay.querySelector('.cancel').click(); });
            });
        }

        // ---------- ФУНКЦИИ ПЛЕЕРА ----------
        function updateEmptyMessage() { emptyMsg.style.display = playlistEl.children.length ? 'none' : 'block'; }
        function updatePlayButton(id, isPlaying) {
            const t = tracksMap.get(id);
            if (!t) return;
            t.playBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
            t.playBtn.classList.toggle('playing', isPlaying);
            // обновить также в плейлисте, если открыт
            const playlistBtn = document.querySelector(`.playlist-list .play-pause-btn[data-id="${id}"]`);
            if (playlistBtn) {
                playlistBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
                playlistBtn.classList.toggle('playing', isPlaying);
            }
        }
        function updateSliderFill(slider, value, max) {
            if (!slider) return;
            const percent = max > 0 ? (value / max) * 100 : 0;
            slider.style.setProperty('--fill-percent', percent + '%');
        }

        // Обновление всех слайдеров с данным trackId
        function updateAllSlidersForTrack(trackId, current, duration) {
            const sliders = document.querySelectorAll(`.progress-slider[data-track-id="${trackId}"]`);
            sliders.forEach(slider => {
                slider.value = current;
                updateSliderFill(slider, current, duration);
                if (!isNaN(duration) && duration > 0) slider.max = Math.floor(duration);
            });
        }

        audio.addEventListener('timeupdate', () => {
            if (!activeTrackId) return;
            const track = tracksMap.get(activeTrackId);
            if (!track) return;
            const current = audio.currentTime;
            const duration = audio.duration || track.duration;
            track.slider.value = current;
            updateSliderFill(track.slider, current, duration);
            if (!isNaN(duration) && duration > 0) track.slider.max = Math.floor(duration);
            // обновить слайдеры в плейлистах
            updateAllSlidersForTrack(activeTrackId, current, duration);
        });

        audio.addEventListener('ended', () => {
            if (!activeTrackId) return;
            if (repeatMode === 2) { audio.currentTime = 0; audio.play().catch(()=>{}); return; }
            const track = tracksMap.get(activeTrackId);
            track.slider.value = 0;
            updateSliderFill(track.slider, 0, track.slider.max);
            updatePlayButton(activeTrackId, false);
            if (autoplayEnabled) {
                const nextId = getNextVisibleTrack(activeTrackId);
                if (nextId) activateTrack(nextId, true);
            }
        });

        function getNextVisibleTrack(currentId) {
            const items = Array.from(playlistEl.children).filter(el => el.style.display !== 'none');
            const idx = items.findIndex(el => el.dataset.id === currentId);
            if (idx === -1) return null;
            let next = idx + 1;
            if (next >= items.length) next = repeatMode === 1 ? 0 : -1;
            return next >= 0 ? items[next]?.dataset.id : null;
        }

        function activateTrack(id, autoPlay = true) {
            const track = tracksMap.get(id);
            if (!track) return;
            if (activeTrackId === id) { if (autoPlay && audio.paused) audio.play().catch(()=>{}); return; }
            if (activeTrackId) {
                const prev = tracksMap.get(activeTrackId);
                if (prev) { prev.slider.value = 0; updateSliderFill(prev.slider, 0, prev.slider.max); updatePlayButton(activeTrackId, false); }
            }
            audio.src = track.objectURL;
            audio.load();
            audio.currentTime = 0;
            activeTrackId = id;
            if (track.duration) track.slider.max = Math.floor(track.duration);
            audio.addEventListener('loadedmetadata', function onMeta() {
                const dur = audio.duration;
                if (dur && !isNaN(dur)) { track.duration = dur; track.slider.max = Math.floor(dur); }
                audio.removeEventListener('loadedmetadata', onMeta);
            });
            track.slider.value = 0;
            updateSliderFill(track.slider, 0, track.slider.max);
            if (autoPlay) { audio.play().catch(()=>{}); updatePlayButton(id, true); }
            else updatePlayButton(id, false);
        }

        function togglePlay(id) {
            const track = tracksMap.get(id); if(!track) return;
            if (activeTrackId !== id) activateTrack(id, true);
            else { if(audio.paused) { audio.play(); updatePlayButton(id, true); } else { audio.pause(); updatePlayButton(id, false); } }
        }

        async function deleteTrack(id) {
            const track = tracksMap.get(id); if(!track) return;
            if (activeTrackId === id) { audio.pause(); audio.src = ''; activeTrackId = null; }
            await deleteTrackFromDB(id);
            URL.revokeObjectURL(track.objectURL);
            track.element.remove();
            tracksMap.delete(id);
            updateEmptyMessage();
            filterTracks();
            await removeTrackFromAllPlaylists(id);
        }

        // БД треки
        async function addTrackToDB(track) { await openDB(); return new Promise((res,rej)=>{ const tx = db.transaction('tracks','readwrite'); const r = tx.objectStore('tracks').put(track); r.onsuccess=res; r.onerror=rej; }); }
        async function getAllTracksFromDB() { await openDB(); return new Promise((res,rej)=>{ const tx = db.transaction('tracks'); const r = tx.objectStore('tracks').getAll(); r.onsuccess=()=>res(r.result); r.onerror=rej; }); }
        async function deleteTrackFromDB(id) { await openDB(); return new Promise((res,rej)=>{ const tx = db.transaction('tracks','readwrite'); const r = tx.objectStore('tracks').delete(id); r.onsuccess=res; r.onerror=rej; }); }

        // UI треков
        function createTrackElement(track) {
            const item = document.createElement('div'); item.className = 'track-item'; item.dataset.id = track.id;
            const row = document.createElement('div'); row.className = 'track-row';
            const actionLeft = document.createElement('div'); actionLeft.className = 'action-left';
            const deleteBtn = document.createElement('div'); deleteBtn.className = 'delete-btn'; deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
            deleteBtn.addEventListener('click', (e)=>{ e.stopPropagation(); showDeleteConfirmation(track.id); });
            actionLeft.appendChild(deleteBtn);
            const infoDiv = document.createElement('div'); infoDiv.className = 'track-info';
            const nameDiv = document.createElement('div'); nameDiv.className = 'track-name'; nameDiv.textContent = track.name;
            const slider = document.createElement('input'); slider.type = 'range'; slider.className = 'progress-slider'; slider.min = 0; slider.max = track.duration||0; slider.value=0; slider.step=0.1;
            slider.dataset.trackId = track.id;
            infoDiv.appendChild(nameDiv); infoDiv.appendChild(slider);
            const playBtn = document.createElement('div'); playBtn.className = 'play-pause-btn'; playBtn.innerHTML = '<i class="fas fa-play"></i>';
            row.appendChild(actionLeft); row.appendChild(infoDiv); row.appendChild(playBtn);
            item.appendChild(row);
            return { item, deleteBtn, playBtn, slider };
        }

        function addTrackToUI(track) {
            const { item, playBtn, slider } = createTrackElement(track);
            playlistEl.appendChild(item);
            tracksMap.set(track.id, { element: item, name: track.name, blob: track.blob, objectURL: URL.createObjectURL(track.blob), duration: track.duration, slider, playBtn });
            playBtn.addEventListener('click', ()=> togglePlay(track.id));
            slider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                updateSliderFill(slider, val, slider.max);
                if (activeTrackId === track.id) audio.currentTime = val;
                else { activateTrack(track.id, false); audio.currentTime = val; updatePlayButton(track.id, false); }
            });
            updatePlayButton(track.id, false);
            updateSliderFill(slider, 0, slider.max);
            updateEmptyMessage();
            filterTracks();
        }

        function filterTracks() {
            const q = searchInput.value.trim().toLowerCase();
            let visibleCount = 0;
            tracksMap.forEach((t) => {
                const visible = !q || t.name.toLowerCase().includes(q);
                t.element.style.display = visible ? 'block' : 'none';
                if (visible) visibleCount++;
            });
            searchInput.placeholder = `Поиск${visibleCount !== tracksMap.size ? ` (${visibleCount})` : ''}`;
        }
        searchInput.addEventListener('input', filterTracks);

        fileInput.addEventListener('change', async (e) => {
            for (const file of Array.from(e.target.files)) {
                if (!file.type.startsWith('audio/') && !file.name.match(/\.(mp3|flac)$/i)) continue;
                let duration; try { duration = await getAudioDuration(file); } catch { duration = null; }
                if (!duration) { alert(`Ошибка чтения: ${file.name}`); continue; }
                const id = crypto.randomUUID ? crypto.randomUUID() : Date.now()+'-'+Math.random().toString(36);
                const track = { id, name: file.name, blob: file, duration };
                await addTrackToDB(track);
                addTrackToUI(track);
            }
            fileInput.value = '';
            filterTracks();
        });
        function getAudioDuration(blob) {
            return new Promise((resolve) => {
                const url = URL.createObjectURL(blob); const a = new Audio(url);
                a.addEventListener('loadedmetadata', ()=>{ resolve(a.duration); URL.revokeObjectURL(url); });
                a.addEventListener('error', ()=>{ resolve(null); URL.revokeObjectURL(url); });
            });
        }

        function showDeleteConfirmation(id) {
            const track = tracksMap.get(id); if(!track) return;
            const left = track.element.querySelector('.action-left');
            left.innerHTML = `<div class="confirm-btn"><i class="fas fa-check"></i></div><div class="cancel-btn"><i class="fas fa-times"></i></div>`;
            left.querySelector('.confirm-btn').addEventListener('click', (e)=>{ e.stopPropagation(); deleteTrack(id); });
            left.querySelector('.cancel-btn').addEventListener('click', (e)=>{ e.stopPropagation(); restoreDeleteButton(track); });
        }

        function restoreDeleteButton(track) {
            const left = track.element.querySelector('.action-left');
            left.innerHTML = `<div class="delete-btn"><i class="fas fa-trash-alt"></i></div>`;
            left.querySelector('.delete-btn').addEventListener('click', (e)=>{ e.stopPropagation(); showDeleteConfirmation(track.element.dataset.id); });
        }

        // ---------- ПЛЕЙЛИСТЫ (БД) ----------
        async function createPlaylist(name) { await openDB(); const id = crypto.randomUUID(); const playlist = { id, name }; return new Promise((res,rej)=>{ const tx = db.transaction('playlists','readwrite'); const r = tx.objectStore('playlists').add(playlist); r.onsuccess=()=>res(id); r.onerror=rej; }); }
        async function getAllPlaylists() { await openDB(); return new Promise((res,rej)=>{ const tx = db.transaction('playlists'); const r = tx.objectStore('playlists').getAll(); r.onsuccess=()=>res(r.result); r.onerror=rej; }); }
        async function updatePlaylist(id, name) { await openDB(); return new Promise((res,rej)=>{ const tx = db.transaction('playlists','readwrite'); const store = tx.objectStore('playlists'); const get = store.get(id); get.onsuccess=()=>{ const pl = get.result; pl.name = name; store.put(pl).onsuccess=res; }; get.onerror=rej; }); }
        async function deletePlaylist(id) { await openDB(); await new Promise((res,rej)=>{ const tx = db.transaction('playlistTracks','readwrite'); const index = tx.objectStore('playlistTracks').index('playlistId'); const r = index.openCursor(IDBKeyRange.only(id)); r.onsuccess=(e)=>{ const cursor=e.target.result; if(cursor){ cursor.delete(); cursor.continue(); } else res(); }; r.onerror=rej; }); return new Promise((res,rej)=>{ const tx = db.transaction('playlists','readwrite'); tx.objectStore('playlists').delete(id).onsuccess=res; }); }
        async function addTracksToPlaylist(playlistId, trackIds) { await openDB(); const tx = db.transaction('playlistTracks','readwrite'); const store = tx.objectStore('playlistTracks'); for (const tid of trackIds) { store.add({ playlistId, trackId: tid }); } return new Promise((res,rej)=>{ tx.oncomplete=res; tx.onerror=rej; }); }
        async function getPlaylistTracks(playlistId) { await openDB(); return new Promise((res,rej)=>{ const tx = db.transaction('playlistTracks'); const index = tx.objectStore('playlistTracks').index('playlistId'); const r = index.getAll(playlistId); r.onsuccess=()=>res(r.result.map(i=>i.trackId)); r.onerror=rej; }); }
        async function removeTrackFromPlaylist(playlistId, trackId) { await openDB(); return new Promise((res,rej)=>{ const tx = db.transaction('playlistTracks','readwrite'); const index = tx.objectStore('playlistTracks').index('playlistId'); const r = index.openCursor(IDBKeyRange.only(playlistId)); r.onsuccess=(e)=>{ const c=e.target.result; if(c){ if(c.value.trackId===trackId) c.delete(); c.continue(); } else res(); }; r.onerror=rej; }); }
        async function removeTrackFromAllPlaylists(trackId) { await openDB(); return new Promise((res)=>{ const tx = db.transaction('playlistTracks','readwrite'); const store = tx.objectStore('playlistTracks'); const index = store.index('trackId'); const r = index.openCursor(IDBKeyRange.only(trackId)); r.onsuccess=(e)=>{ const c=e.target.result; if(c){ c.delete(); c.continue(); } else res(); }; }); }

        // ---------- ОТОБРАЖЕНИЕ МОДАЛКИ ПЛЕЙЛИСТОВ ----------
        function showPlaylistsModal() { renderPlaylistsList(); modal.classList.add('visible'); }
        function hidePlaylistsModal() { modal.classList.remove('visible'); }

        function renderPlaylistsList() {
            panelContainer.innerHTML = `
                <div class="panel-header">
                    <h2>Плейлисты</h2>
                    <button class="close-panel-btn" id="close-modal-btn"><i class="fas fa-times"></i></button>
                </div>
                <div class="playlist-search"><i class="fas fa-search"></i><input type="text" id="playlist-search-input" placeholder="Поиск"></div>
                <button class="create-playlist-btn" id="create-playlist-btn"><i class="fas fa-plus-circle"></i> Новый плейлист</button>
                <div class="playlist-list" id="playlist-list-container"></div>
            `;
            document.getElementById('close-modal-btn').addEventListener('click', hidePlaylistsModal);
            document.getElementById('create-playlist-btn').addEventListener('click', async ()=>{
                const name = await customPrompt('Название плейлиста');
                if(name) { await createPlaylist(name); renderPlaylistsList(); }
            });
            const searchInput = document.getElementById('playlist-search-input');
            searchInput.addEventListener('input', filterPlaylists);
            loadPlaylistsToContainer();
        }

        async function loadPlaylistsToContainer() {
            const container = document.getElementById('playlist-list-container');
            const playlists = await getAllPlaylists();
            const q = document.getElementById('playlist-search-input')?.value.toLowerCase() || '';
            const filtered = playlists.filter(p=>p.name.toLowerCase().includes(q));
            container.innerHTML = filtered.map(p=>`
                <div class="playlist-item" data-id="${p.id}">
                    <div class="playlist-info">${p.name}</div>
                    <div class="playlist-actions">
                        <button class="icon-btn edit-playlist-btn" data-id="${p.id}"><i class="fas fa-pencil-alt"></i></button>
                        <button class="icon-btn delete-playlist-btn" data-id="${p.id}"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `).join('');
            container.querySelectorAll('.playlist-item').forEach(el=>{
                el.addEventListener('click', (e)=>{ if(!e.target.closest('button')) openPlaylistDetail(el.dataset.id); });
            });
            container.querySelectorAll('.edit-playlist-btn').forEach(b=>b.addEventListener('click', async (e)=>{
                e.stopPropagation();
                const id = b.dataset.id;
                const pl = (await getAllPlaylists()).find(p=>p.id===id);
                const newName = await customPrompt('Новое название', pl.name);
                if(newName) { await updatePlaylist(id, newName); renderPlaylistsList(); }
            }));
            container.querySelectorAll('.delete-playlist-btn').forEach(b=>b.addEventListener('click', async (e)=>{
                e.stopPropagation();
                const id = b.dataset.id;
                const pl = (await getAllPlaylists()).find(p=>p.id===id);
                const confirmed = await customConfirm(`Удалить плейлист «${pl.name}»?`);
                if(confirmed) { await deletePlaylist(id); renderPlaylistsList(); }
            }));
            // обновление плейсхолдера с количеством
            const searchField = document.getElementById('playlist-search-input');
            if (searchField) {
                const total = playlists.length;
                searchField.placeholder = `Поиск${filtered.length !== total ? ` (${filtered.length})` : ''}`;
            }
        }
        function filterPlaylists() { loadPlaylistsToContainer(); }

        function openPlaylistDetail(playlistId) {
            currentPlaylistId = playlistId;
            renderPlaylistDetail();
        }

        async function renderPlaylistDetail() {
            const playlist = (await getAllPlaylists()).find(p=>p.id===currentPlaylistId);
            panelContainer.innerHTML = `
                <div class="panel-header">
                    <h2>${playlist.name}</h2>
                    <button class="close-panel-btn" id="back-from-detail"><i class="fas fa-times"></i></button>
                </div>
                <div class="playlist-detail-controls">
                    <div class="playlist-search" style="flex:1; margin-bottom:0;"><i class="fas fa-search"></i><input type="text" id="detail-search" placeholder="Поиск"></div>
                    <div class="control-btn" id="detail-autoplay-btn" title="Автовоспроизведение"><i class="fas fa-play-circle"></i></div>
                    <div class="control-btn" id="detail-repeat-btn" title="Режим повтора"><i class="fas fa-repeat"></i></div>
                </div>
                <button class="add-tracks-btn" id="add-tracks-to-playlist"><i class="fas fa-plus"></i> Добавить треки</button>
                <div class="playlist-list" id="playlist-tracks-container"></div>
            `;
            document.getElementById('back-from-detail').addEventListener('click', ()=>{ renderPlaylistsList(); });
            document.getElementById('add-tracks-to-playlist').addEventListener('click', ()=>{
                pendingAddToPlaylistId = currentPlaylistId;
                showTrackSelector();
            });
            const detailSearch = document.getElementById('detail-search');
            detailSearch.addEventListener('input', ()=> loadPlaylistTracks(currentPlaylistId));
            
            // синхронизация кнопок автовоспроизведения и повтора
            const detailAutoplay = document.getElementById('detail-autoplay-btn');
            const detailRepeat = document.getElementById('detail-repeat-btn');
            detailAutoplay.classList.toggle('active', autoplayEnabled);
            detailRepeat.classList.toggle('active', repeatMode === 1);
            detailRepeat.classList.toggle('repeat-one', repeatMode === 2);
            
            detailAutoplay.addEventListener('click', ()=>{
                autoplayEnabled = !autoplayEnabled;
                localStorage.setItem('autoplay', autoplayEnabled);
                autoplayBtn.classList.toggle('active', autoplayEnabled);
                detailAutoplay.classList.toggle('active', autoplayEnabled);
            });
            detailRepeat.addEventListener('click', ()=>{
                repeatMode = (repeatMode + 1) % 3;
                localStorage.setItem('repeatMode', repeatMode);
                updateRepeatButton();
                detailRepeat.classList.toggle('active', repeatMode === 1);
                detailRepeat.classList.toggle('repeat-one', repeatMode === 2);
            });

            await loadPlaylistTracks(currentPlaylistId);
        }

        async function loadPlaylistTracks(playlistId, filterText = '') {
            const container = document.getElementById('playlist-tracks-container');
            const trackIds = await getPlaylistTracks(playlistId);
            const allTracks = await getAllTracksFromDB();
            const q = filterText || document.getElementById('detail-search')?.value.toLowerCase() || '';
            const tracks = allTracks.filter(t=>trackIds.includes(t.id) && (!q || t.name.toLowerCase().includes(q)));
            container.innerHTML = tracks.map(t=>{
                const isActive = (activeTrackId === t.id);
                const isPlaying = isActive && !audio.paused;
                return `
                <div class="track-item" data-id="${t.id}">
                    <div class="track-row">
                        <div class="action-left">
                            <div class="delete-btn" data-id="${t.id}"><i class="fas fa-trash-alt"></i></div>
                        </div>
                        <div class="track-info">
                            <div class="track-name">${t.name}</div>
                            <input type="range" class="progress-slider" min="0" max="${t.duration||0}" value="${isActive ? audio.currentTime : 0}" step="0.1" data-track-id="${t.id}">
                        </div>
                        <div class="play-pause-btn" data-id="${t.id}">
                            <i class="fas fa-${isPlaying ? 'pause' : 'play'}"></i>
                        </div>
                    </div>
                </div>
            `}).join('');
            // инициализация слайдеров
            container.querySelectorAll('.progress-slider').forEach(slider => {
                const trackId = slider.dataset.trackId;
                const track = allTracks.find(t=>t.id === trackId);
                if (track) {
                    const val = (activeTrackId === trackId) ? audio.currentTime : 0;
                    slider.value = val;
                    updateSliderFill(slider, val, track.duration);
                }
                slider.addEventListener('input', (e) => {
                    const val = parseFloat(e.target.value);
                    updateSliderFill(slider, val, slider.max);
                    if (activeTrackId === trackId) audio.currentTime = val;
                    else {
                        // активировать трек, но не запускать автовоспроизведение
                        const trackData = allTracks.find(t=>t.id === trackId);
                        if (trackData && !tracksMap.has(trackId)) {
                            addTrackToUI(trackData);
                        }
                        activateTrack(trackId, false);
                        audio.currentTime = val;
                    }
                });
            });
            container.querySelectorAll('.delete-btn').forEach(b=>{
                b.addEventListener('click', (e)=>{
                    e.stopPropagation();
                    const tid = b.dataset.id;
                    const item = b.closest('.track-item');
                    showPlaylistTrackDeleteConfirmation(item, playlistId, tid);
                });
            });
            container.querySelectorAll('.play-pause-btn').forEach(b=>{
                b.addEventListener('click', ()=>{
                    const tid = b.dataset.id;
                    if (tracksMap.has(tid)) togglePlay(tid);
                    else {
                        const trackData = allTracks.find(t=>t.id===tid);
                        if(trackData) { addTrackToUI(trackData); togglePlay(tid); }
                    }
                });
            });
            // обновление плейсхолдера поиска
            const searchField = document.getElementById('detail-search');
            if (searchField) {
                const total = trackIds.length;
                searchField.placeholder = `Поиск${tracks.length !== total ? ` (${tracks.length})` : ''}`;
            }
        }

        function showPlaylistTrackDeleteConfirmation(itemElement, playlistId, trackId) {
            const left = itemElement.querySelector('.action-left');
            left.innerHTML = `<div class="confirm-btn"><i class="fas fa-check"></i></div><div class="cancel-btn"><i class="fas fa-times"></i></div>`;
            left.querySelector('.confirm-btn').addEventListener('click', async (e)=>{
                e.stopPropagation();
                await removeTrackFromPlaylist(playlistId, trackId);
                loadPlaylistTracks(playlistId);
            });
            left.querySelector('.cancel-btn').addEventListener('click', (e)=>{
                e.stopPropagation();
                left.innerHTML = `<div class="delete-btn" data-id="${trackId}"><i class="fas fa-trash-alt"></i></div>`;
                left.querySelector('.delete-btn').addEventListener('click', (e2)=>{
                    e2.stopPropagation();
                    showPlaylistTrackDeleteConfirmation(itemElement, playlistId, trackId);
                });
            });
        }

        // Выбор треков
        function showTrackSelector() {
            selectorModal.classList.add('visible');
            renderSelectorList();
        }
        async function renderSelectorList() {
            const tracks = await getAllTracksFromDB();
            selectorList.innerHTML = tracks.map(t=>`
                <div class="selector-item">
                    <input type="checkbox" value="${t.id}" id="chk_${t.id}">
                    <label for="chk_${t.id}">${t.name}</label>
                </div>
            `).join('');
        }
        selectorCancel.addEventListener('click', ()=>{
            selectorModal.classList.remove('visible');
            pendingAddToPlaylistId = null;
        });
        selectorConfirm.addEventListener('click', async ()=>{
            const checked = [...selectorList.querySelectorAll('input:checked')].map(cb=>cb.value);
            if(pendingAddToPlaylistId && checked.length) {
                await addTracksToPlaylist(pendingAddToPlaylistId, checked);
                if(currentPlaylistId === pendingAddToPlaylistId) await loadPlaylistTracks(currentPlaylistId);
            }
            selectorModal.classList.remove('visible');
            pendingAddToPlaylistId = null;
        });
        selectorModal.addEventListener('click', (e)=>{ if(e.target===selectorModal) selectorCancel.click(); });

        // Кнопки управления
        autoplayBtn.addEventListener('click', ()=>{ autoplayEnabled=!autoplayEnabled; localStorage.setItem('autoplay', autoplayEnabled); autoplayBtn.classList.toggle('active', autoplayEnabled); });
        repeatBtn.addEventListener('click', ()=>{ repeatMode=(repeatMode+1)%3; localStorage.setItem('repeatMode', repeatMode); updateRepeatButton(); });
        function updateRepeatButton() {
            repeatBtn.classList.remove('active','repeat-one');
            if(repeatMode===1) repeatBtn.classList.add('active');
            if(repeatMode===2) repeatBtn.classList.add('active','repeat-one');
        }
        updateRepeatButton();
        autoplayBtn.classList.toggle('active', autoplayEnabled);
        playlistsBtn.addEventListener('click', showPlaylistsModal);
        modal.addEventListener('click', (e)=>{ if(e.target===modal) hidePlaylistsModal(); });

        // Инициализация
        (async function init(){
            await openDB();
            applyTheme();
            const tracks = await getAllTracksFromDB();
            tracks.forEach(t=>addTrackToUI(t));
            filterTracks();
        })();

    })();
</script>
</body>
</html>
