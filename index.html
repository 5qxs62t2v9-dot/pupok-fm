<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Пупок FM</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Пупок FM">
    <meta name="theme-color" id="theme-color-meta" content="#b8a9d2">
    
    <!-- iOS / Apple touch icon – используем только 512x512 -->
    <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512x512.png">
    <link rel="apple-touch-icon" href="icons/icon-512x512.png">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/icon-96x96.png">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="shortcut icon" href="favicon.ico">
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        /* ---------- СБРОС И БАЗА ---------- */
        html, body {
            overscroll-behavior: none;
            overflow: hidden;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Запрет системного контекстного меню на весь документ */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Запрет выделения текста и изображений */
            -webkit-user-select: none;
            user-select: none;
        }

        /* ---------- ПЕРЕМЕННЫЕ (МЯГКИЕ ЦВЕТА) ---------- */
        body {
            --bg-gradient-start: #f3e8fd;
            --bg-gradient-end: #e2d9f0;
            --container-bg: rgba(245, 240, 250, 0.8);
            --text-primary: #2e1a47;
            --text-secondary: #4a2e62;
            --text-muted: #7a6a8a;
            --accent: #9b7bc1;
            --accent-light: #bda0dc;
            --card-bg: rgba(255, 245, 255, 0.6);
            --card-border: rgba(255, 250, 255, 0.7);
            --shadow: 0 25px 40px -20px rgba(90, 40, 120, 0.15);
            --delete-color: #e57373;
            --slider-track: rgba(160, 130, 200, 0.2);
            --slider-thumb: #ffffff;
            --scroll-thumb: #c2addb;
            --scroll-track: #ede4f5;
            --icon-bg: #ffffffd0;
            --panel-bg: rgba(250, 245, 255, 0.8);
            --control-btn-bg: var(--icon-bg);
            --control-btn-color: var(--accent);
            --panel-separator: rgba(130, 100, 160, 0.1);
            
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 0.2s, color 0.2s;
        }

        body.dark {
            --bg-gradient-start: #1e1528;
            --bg-gradient-end: #2a1f36;
            --container-bg: rgba(30, 20, 40, 0.95);
            --text-primary: #ede4f7;
            --text-secondary: #d2c4e0;
            --text-muted: #b09bc0;
            --accent: #b494d9;
            --accent-light: #d2b8ed;
            --card-bg: rgba(50, 35, 65, 0.7);
            --card-border: rgba(255, 245, 255, 0.08);
            --shadow: 0 25px 40px -20px rgba(0,0,0,0.5);
            --delete-color: #f49797;
            --slider-track: rgba(200, 170, 220, 0.2);
            --slider-thumb: #e8d9f2;
            --scroll-thumb: #9b7bc1;
            --scroll-track: #3e2c4a;
            --icon-bg: #372b45;
            --panel-bg: rgba(40, 25, 55, 0.9);
            --control-btn-bg: #3d2d50;
            --control-btn-color: #c7b0e0;
            --panel-separator: rgba(220, 190, 250, 0.15);
        }

        /* ---------- ОСНОВНОЙ КОНТЕЙНЕР ---------- */
        .player-container {
            width: 100%;
            height: 100vh;
            background: var(--container-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: var(--shadow);
            padding: max(24px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom)) 16px;
            display: flex;
            flex-direction: column;
            border-radius: 36px;
            overflow: hidden;
            position: relative;
        }

        /* ---------- ХЭДЕР ---------- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 0 4px;
            flex-shrink: 0;
        }

        .theme-toggle, .upload-btn {
            background: var(--icon-bg);
            width: 48px;
            height: 48px;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.03);
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            color: var(--accent);
            font-size: 22px;
            flex-shrink: 0;
            backdrop-filter: blur(5px);
        }

        .theme-toggle:active, .upload-btn:active {
            transform: scale(0.94);
            background: var(--card-bg);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            text-align: center;
            flex: 1;
        }

        /* ---------- ДАТА (английская с верхним индексом 67 и суффиксом) ---------- */
        .date-container {
            text-align: center;
            margin-bottom: 12px;
            flex-shrink: 0;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--panel-bg);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            padding: 8px 16px;
            width: fit-content;
            align-self: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .date-container sup {
            font-size: 0.75em;
            vertical-align: super;
        }

        #file-input {
            display: none;
        }

        /* ---------- ПОИСК + УПРАВЛЕНИЕ ---------- */
        .search-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .search-panel {
            background: var(--panel-bg);
            border-radius: 40px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: none;
            backdrop-filter: blur(5px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            flex: 1;
            min-width: 0;
        }

        .search-panel i {
            color: var(--accent);
            font-size: 18px;
            opacity: 0.9;
        }

        #search-input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            font-size: 17px;
            color: var(--text-primary);
        }

        #search-input::placeholder {
            color: var(--text-muted);
        }

        .playback-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .control-btn {
            background: var(--control-btn-bg);
            width: 48px;
            height: 48px;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
            border: none;
            color: var(--control-btn-color);
            font-size: 22px;
            backdrop-filter: blur(5px);
        }

        .control-btn:active {
            transform: scale(0.92);
        }

        .control-btn.active {
            background: var(--accent);
            color: white;
        }

        .control-btn.repeat-one {
            position: relative;
        }
        .control-btn.repeat-one::after {
            content: '1';
            position: absolute;
            font-size: 12px;
            font-weight: bold;
            bottom: 4px;
            right: 8px;
            color: currentColor;
        }

        /* ---------- ПАНЕЛЬ ПЛЕЙЛИСТА (основная) ---------- */
        .playlist-panel {
            background: var(--panel-bg);
            border-radius: 36px;
            padding: 18px 0 18px 14px;
            border: none;
            backdrop-filter: blur(5px);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .playlist-content {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--scroll-thumb) var(--scroll-track);
            -webkit-overflow-scrolling: touch;
            padding-right: 6px;
            /* разрешаем скролл только внутри этой области */
        }

        .playlist-content::-webkit-scrollbar {
            width: 6px;
        }
        .playlist-content::-webkit-scrollbar-track {
            background: var(--scroll-track);
            border-radius: 10px;
        }
        .playlist-content::-webkit-scrollbar-thumb {
            background: var(--scroll-thumb);
            border-radius: 10px;
        }

        .empty-message {
            text-align: center;
            padding: 40px 20px;
            margin-right: 12px;
            color: var(--text-muted);
            font-size: 18px;
            font-weight: 500;
        }

        /* ---------- ЭЛЕМЕНТ ТРЕКА ---------- */
        .track-item {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 12px;
            margin-right: 8px;
            border: none;
            backdrop-filter: blur(5px);
        }

        .track-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .action-left {
            width: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .delete-btn, .confirm-btn, .cancel-btn {
            width: 40px;
            height: 40px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--icon-bg);
            cursor: pointer;
            transition: 0.1s;
            border: none;
            font-size: 18px;
        }

        .delete-btn { color: var(--delete-color); }
        .delete-btn:active, .confirm-btn:active, .cancel-btn:active { transform: scale(0.9); }
        .confirm-btn { color: #6fcf97; }
        .cancel-btn { color: var(--delete-color); }

        .track-info {
            flex: 1;
            min-width: 0;
        }

        .track-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 16px;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ----- ПРОГРЕСС-БАР С ЗАПОЛНЕНИЕМ (исправлено: кружок не обрезается) ----- */
        .progress-slider {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: transparent;
            cursor: pointer;
            border-radius: 20px;
        }

        .progress-slider:focus {
            outline: none;
        }

        .progress-slider::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: var(--slider-track);
            border-radius: 20px;
        }

        .progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 18px;
            background: var(--slider-thumb);
            box-shadow: 0 2px 10px rgba(155, 123, 193, 0.5);
            border: 2px solid var(--accent);
            margin-top: -6px;
            position: relative;
            z-index: 2;
        }

        .progress-slider {
            background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--fill-percent, 0%), transparent var(--fill-percent, 0%));
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: left center;
            border-radius: 20px;
        }

        .play-pause-btn {
            color: var(--accent);
            font-size: 24px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 32px;
            background: var(--icon-bg);
            box-shadow: 0 6px 12px rgba(155, 123, 193, 0.15);
            cursor: pointer;
            flex-shrink: 0;
            border: none;
            backdrop-filter: blur(5px);
        }

        .play-pause-btn:active { transform: scale(0.92); }
        .play-pause-btn.playing {
            color: white;
            background: var(--accent);
        }

        .hidden { display: none !important; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body oncontextmenu="return false;">
<div class="player-container">
    <!-- Хедер -->
    <div class="header">
        <div class="theme-toggle" id="theme-toggle"><i class="fas fa-sun"></i></div>
        <h1>Пупок FM</h1>
        <label for="file-input" class="upload-btn"><i class="fas fa-plus"></i></label>
        <input type="file" id="file-input" accept=".mp3,.flac,audio/mpeg,audio/flac" multiple>
    </div>

    <!-- Блок с датой по-английски + степень 67 -->
    <div class="date-container" id="date-container">The 22<sup>67</sup><sup>nd</sup> of April</div>

    <!-- Поиск + кнопки управления -->
    <div class="search-row">
        <div class="search-panel">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Поиск (0)" autocomplete="off">
        </div>
        <div class="playback-controls">
            <div class="control-btn" id="autoplay-btn" title="Автовоспроизведение"><i class="fas fa-play-circle"></i></div>
            <div class="control-btn" id="repeat-btn" title="Режим повтора"><i class="fas fa-repeat"></i></div>
        </div>
    </div>

    <!-- Основная панель треков (только здесь разрешён скролл) -->
    <div class="playlist-panel">
        <div class="playlist-content" id="playlist-content">
            <div id="playlist"></div>
            <div id="empty-message" class="empty-message">🎵 Плейлист пуст</div>
        </div>
    </div>
</div>

<audio id="global-audio" style="display: none;"></audio>

<script>
    (function(){
        "use strict";

        // ---------- ОБНОВЛЕНИЕ КЭША (удаление старых версий Service Worker и кэшей) ----------
        const CACHE_VERSION = 'pupok-fm-v2';
        if ('caches' in window) {
            caches.keys().then(keys => {
                keys.forEach(key => {
                    if (key !== CACHE_VERSION) {
                        caches.delete(key);
                        console.log('Старый кэш удалён:', key);
                    }
                });
            });
        }
        // Перерегистрация service worker с новой версией (если sw.js существует)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for(let registration of registrations) {
                    registration.unregister();
                }
            }).then(() => {
                navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(console.error);
            });
        }

        // ---------- ЗАПРЕТ ЛИСТАНИЯ ВСЕЙ СТРАНИЦЫ (скролл только внутри .playlist-content) ----------
        function preventScrollOnNonScrollable(e) {
            const target = e.target;
            const scrollable = document.querySelector('.playlist-content');
            // Разрешаем touchmove только если цель находится внутри .playlist-content И контент может скроллиться
            if (!scrollable || !scrollable.contains(target)) {
                e.preventDefault();
                return false;
            }
            // Дополнительная проверка: если элемент внутри .playlist-content, но скролл достиг границы
            let el = target;
            while (el && el !== scrollable) {
                el = el.parentElement;
            }
            if (el === scrollable) {
                // Проверяем направление скролла: если вверх и скролл вверху, или вниз и скролл внизу
                const scrollTop = scrollable.scrollTop;
                const scrollHeight = scrollable.scrollHeight;
                const clientHeight = scrollable.clientHeight;
                const deltaY = e.deltaY || (e.touches ? e.touches[0].clientY : 0);
                // Для упрощения – разрешаем всегда, но браузер сам обработает границы
                // Однако некоторые браузеры вызывают overscroll – блокируем только если не нужно
                if ((scrollTop <= 0 && deltaY < 0) || (scrollTop + clientHeight >= scrollHeight && deltaY > 0)) {
                    // достигнут край – можно разрешить, но чтобы не листать страницу, всё равно блокируем
                    e.preventDefault();
                    return false;
                }
                return true;
            }
            e.preventDefault();
            return false;
        }

        // Запрещаем скролл на body и document
        window.addEventListener('touchmove', preventScrollOnScrollable, { passive: false });
        window.addEventListener('wheel', preventScrollOnScrollable, { passive: false });
        // Также для безопасности блокируем колесо мыши
        document.body.addEventListener('wheel', preventScrollOnScrollable, { passive: false });
        
        function preventScrollOnScrollable(e) {
            const scrollable = document.querySelector('.playlist-content');
            if (!scrollable) return;
            const target = e.target;
            const isInsideScrollable = scrollable.contains(target);
            if (!isInsideScrollable) {
                e.preventDefault();
                return;
            }
            // Если внутри – проверяем, можно ли скроллить
            const scrollTop = scrollable.scrollTop;
            const scrollHeight = scrollable.scrollHeight;
            const clientHeight = scrollable.clientHeight;
            let deltaY = 0;
            if (e.type === 'wheel') deltaY = e.deltaY;
            else if (e.type === 'touchmove' && e.touches.length) {
                // Для touchmove сложнее, но мы просто разрешаем внутри, не блокируем
                return; // разрешаем
            }
            if (deltaY !== 0) {
                if ((scrollTop <= 0 && deltaY < 0) || (scrollTop + clientHeight >= scrollHeight && deltaY > 0)) {
                    e.preventDefault();
                }
            }
        }
        // Упростим: разрешаем все touchmove внутри .playlist-content, иначе блок
        document.addEventListener('touchmove', function(e) {
            const scrollable = document.querySelector('.playlist-content');
            if (!scrollable || !scrollable.contains(e.target)) {
                e.preventDefault();
            }
        }, { passive: false });

        // ---------- ОТКЛЮЧЕНИЕ СИСТЕМНОГО КОНТЕКСТНОГО МЕНЮ, КОПИРОВАНИЯ, ПРИБЛИЖЕНИЯ ----------
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        // Запрет выделения текста (дополнительно)
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
            return false;
        });
        // Запрет жестов увеличения (уже есть в meta, но на всякий случай)
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });
        // Разрешаем многопальцевое нажатие (не блокируем touchstart с несколькими пальцами)
        // Ничего не делаем – по умолчанию разрешено

        // ---------- БАЗА ДАННЫХ (только треки) ----------
        const DB_NAME = 'PupokFMDB';
        const DB_VERSION = 5; // увеличиваем версию, удаляем старые хранилища плейлистов
        let db = null;

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => { db = request.result; resolve(db); };
                request.onupgradeneeded = (evt) => {
                    const db = evt.target.result;
                    if (db.objectStoreNames.contains('playlists')) {
                        db.deleteObjectStore('playlists');
                    }
                    if (db.objectStoreNames.contains('playlistTracks')) {
                        db.deleteObjectStore('playlistTracks');
                    }
                    if (!db.objectStoreNames.contains('tracks')) {
                        db.createObjectStore('tracks', { keyPath: 'id' });
                    }
                };
            });
        }

        // ---------- ТЕМА ----------
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = themeToggle.querySelector('i');
        let currentTheme = localStorage.getItem('pupokTheme') || 'system';
        function applyTheme() {
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            let isDark = currentTheme === 'dark' || (currentTheme === 'system' && systemDark);
            document.body.classList.toggle('dark', isDark);
            themeIcon.className
