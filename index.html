<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Пупок FM</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Пупок FM">
    <meta name="theme-color" id="theme-color-meta" content="#b8a9d2">
    
    <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512x512.png">
    <link rel="apple-touch-icon" href="icons/icon-512x512.png">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/icon-96x96.png">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="shortcut icon" href="favicon.ico">
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        /* ---------- СБРОС И БАЗА ---------- */
        html, body {
            overscroll-behavior: none;
            overflow: hidden;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* ---------- ПЕРЕМЕННЫЕ (МЯГКИЕ ЦВЕТА) ---------- */
        body {
            --bg-gradient-start: #f3e8fd;
            --bg-gradient-end: #e2d9f0;
            --container-bg: rgba(245, 240, 250, 0.8);
            --text-primary: #2e1a47;
            --text-secondary: #4a2e62;
            --text-muted: #7a6a8a;
            --accent: #9b7bc1;
            --accent-light: #bda0dc;
            --card-bg: rgba(255, 245, 255, 0.6);
            --card-border: rgba(255, 250, 255, 0.7);
            --shadow: 0 25px 40px -20px rgba(90, 40, 120, 0.15);
            --delete-color: #e57373;
            --slider-track: rgba(160, 130, 200, 0.2);
            --slider-thumb: #ffffff;
            --scroll-thumb: #c2addb;
            --scroll-track: #ede4f5;
            --icon-bg: #ffffffd0;
            --panel-bg: rgba(250, 245, 255, 0.8);
            --control-btn-bg: var(--icon-bg);
            --control-btn-color: var(--accent);
            --panel-separator: rgba(130, 100, 160, 0.1);
            --modal-overlay: rgba(30, 10, 40, 0.3);
            
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            transition: background 0.2s, color 0.2s;
        }

        body.dark {
            --bg-gradient-start: #1e1028;
            --bg-gradient-end: #2e1a40;
            --container-bg: rgba(25, 15, 35, 0.95);
            --text-primary: #ede4f7;
            --text-secondary: #d2c4e0;
            --text-muted: #b09bc0;
            --accent: #b494d9;
            --accent-light: #d2b8ed;
            --card-bg: rgba(50, 35, 65, 0.7);
            --card-border: rgba(255, 245, 255, 0.08);
            --shadow: 0 25px 40px -20px rgba(0,0,0,0.5);
            --delete-color: #f49797;
            --slider-track: rgba(200, 170, 220, 0.2);
            --slider-thumb: #e8d9f2;
            --scroll-thumb: #9b7bc1;
            --scroll-track: #3e2c4a;
            --icon-bg: #372b45;
            --panel-bg: rgba(40, 25, 55, 0.9);
            --control-btn-bg: #3d2d50;
            --control-btn-color: #c7b0e0;
            --panel-separator: rgba(220, 190, 250, 0.15);
            --modal-overlay: rgba(10, 5, 15, 0.5);
        }

        /* ---------- ОСНОВНОЙ КОНТЕЙНЕР ---------- */
        .player-container {
            width: 100%;
            height: 100%;
            background: var(--container-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: var(--shadow);
            padding: max(24px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom)) 16px;
            display: flex;
            flex-direction: column;
            border-radius: 36px;
            overflow: hidden;
        }

        /* ---------- ХЭДЕР ---------- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 0 4px;
            flex-shrink: 0;
        }

        .theme-toggle, .upload-btn {
            background: var(--icon-bg);
            width: 48px;
            height: 48px;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.03);
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            color: var(--accent);
            font-size: 22px;
            flex-shrink: 0;
            backdrop-filter: blur(5px);
        }

        .theme-toggle:active, .upload-btn:active {
            transform: scale(0.94);
            background: var(--card-bg);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            text-align: center;
            flex: 1;
        }

        #file-input {
            display: none;
        }

        /* ---------- ПОИСК + УПРАВЛЕНИЕ ---------- */
        .search-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .search-panel {
            background: var(--panel-bg);
            border-radius: 40px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: none;
            backdrop-filter: blur(5px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            flex: 1;
            min-width: 0;
        }

        .search-panel i {
            color: var(--accent);
            font-size: 18px;
            opacity: 0.9;
        }

        #search-input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            font-size: 17px;
            color: var(--text-primary);
        }

        #search-input::placeholder {
            color: var(--text-muted);
        }

        .playback-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .control-btn {
            background: var(--control-btn-bg);
            width: 48px;
            height: 48px;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
            border: none;
            color: var(--control-btn-color);
            font-size: 22px;
            backdrop-filter: blur(5px);
        }

        .control-btn:active {
            transform: scale(0.92);
        }

        .control-btn.active {
            background: var(--accent);
            color: white;
        }

        .control-btn.repeat-one {
            position: relative;
        }
        .control-btn.repeat-one::after {
            content: '1';
            position: absolute;
            font-size: 12px;
            font-weight: bold;
            bottom: 4px;
            right: 8px;
            color: currentColor;
        }

        /* ---------- ПАНЕЛЬ ПЛЕЙЛИСТА (основная) ---------- */
        .playlist-panel {
            background: var(--panel-bg);
            border-radius: 36px;
            padding: 18px 0 18px 14px;
            border: none;
            backdrop-filter: blur(5px);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .playlist-content {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--scroll-thumb) var(--scroll-track);
            -webkit-overflow-scrolling: touch;
            padding-right: 6px;
        }

        .playlist-content::-webkit-scrollbar {
            width: 6px;
        }
        .playlist-content::-webkit-scrollbar-track {
            background: var(--scroll-track);
            border-radius: 10px;
        }
        .playlist-content::-webkit-scrollbar-thumb {
            background: var(--scroll-thumb);
            border-radius: 10px;
        }

        .empty-message {
            text-align: center;
            padding: 40px 20px;
            margin-right: 12px;
            color: var(--text-muted);
            font-size: 18px;
            font-weight: 500;
        }

        /* ---------- ЭЛЕМЕНТ ТРЕКА ---------- */
        .track-item {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 12px;
            margin-right: 8px;
            border: none;
            backdrop-filter: blur(5px);
        }

        .track-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .action-left {
            width: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .delete-btn, .confirm-btn, .cancel-btn {
            width: 40px;
            height: 40px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--icon-bg);
            cursor: pointer;
            transition: 0.1s;
            border: none;
            font-size: 18px;
        }

        .delete-btn { color: var(--delete-color); }
        .delete-btn:active, .confirm-btn:active, .cancel-btn:active { transform: scale(0.9); }
        .confirm-btn { color: #6fcf97; }
        .cancel-btn { color: var(--delete-color); }

        .track-info {
            flex: 1;
            min-width: 0;
        }

        .track-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 16px;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ----- ПРОГРЕСС-БАР (с отдельным заполнением, без сквадрачивания) ----- */
        .progress-container {
            position: relative;
            width: 100%;
            height: 6px;
        }

        .progress-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: transparent;
            cursor: pointer;
            z-index: 2;
        }

        .progress-slider:focus {
            outline: none;
        }

        .progress-slider::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: transparent;
            border-radius: 20px;
        }

        .progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 18px;
            background: var(--slider-thumb);
            box-shadow: 0 2px 10px rgba(155, 123, 193, 0.5);
            border: 2px solid var(--accent);
            margin-top: -6px;
            position: relative;
            z-index: 3;
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            width: 0%;
            height: 6px;
            background: var(--accent);
            border-radius: 20px;
            pointer-events: none;
            z-index: 1;
            transition: width 0.05s linear;
        }

        .progress-track-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--slider-track);
            border-radius: 20px;
            z-index: 0;
        }

        .play-pause-btn {
            color: var(--accent);
            font-size: 24px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 32px;
            background: var(--icon-bg);
            box-shadow: 0 6px 12px rgba(155, 123, 193, 0.15);
            cursor: pointer;
            flex-shrink: 0;
            border: none;
            backdrop-filter: blur(5px);
        }

        .play-pause-btn:active { transform: scale(0.92); }
        .play-pause-btn.playing {
            color: white;
            background: var(--accent);
        }

        .hidden { display: none !important; }

        /* ---------- МОДАЛЬНОЕ ОКНО ПЛЕЙЛИСТОВ (полноэкранное) ---------- */
        .playlists-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--modal-overlay);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .playlists-modal.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .playlists-panel {
            background: var(--container-bg);
            backdrop-filter: blur(25px);
            width: 100%;
            height: 100%;
            border-radius: 0;
            padding: max(24px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom)) 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        .playlists-modal.visible .playlists-panel {
            transform: translateY(0);
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .panel-header h2 {
            flex: 1;
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .close-panel-btn {
            background: var(--icon-bg);
            width: 48px;
            height: 48px;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: var(--accent);
            font-size: 22px;
            backdrop-filter: blur(5px);
        }

        .playlist-search {
            margin-bottom: 16px;
            background: var(--panel-bg);
            border-radius: 40px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(5px);
        }
        .playlist-search i { color: var(--accent); font-size: 18px; }
        .playlist-search input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            color: var(--text-primary);
            font-size: 17px;
        }

        .create-playlist-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 16px;
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(5px);
        }
        .create-playlist-btn:active { opacity: 0.8; }

        .playlist-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }

        .playlist-item {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 16px 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(5px);
        }
        .playlist-info {
            flex: 1;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 17px;
        }
        .playlist-actions {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            background: var(--icon-bg);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: var(--accent);
            font-size: 18px;
        }

        /* Детали плейлиста */
        .playlist-detail-view {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .add-tracks-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 16px;
            font-weight: 600;
            font-size: 17px;
            margin: 12px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Панель треков в плейлисте (как основной) */
        .playlist-tracks-panel {
            background: var(--panel-bg);
            border-radius: 36px;
            padding: 18px 0 18px 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-top: 8px;
        }

        /* Строка поиска с кнопками внутри детали */
        .detail-search-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .detail-search-row .playlist-search {
            flex: 1;
            margin-bottom: 0;
        }

        /* Окно ввода названия (кастомное) */
        .input-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            z-index: 1200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .input-modal.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .input-panel {
            background: var(--container-bg);
            width: 90%;
            max-width: 400px;
            border-radius: 36px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .input-panel input {
            background: var(--panel-bg);
            border: none;
            border-radius: 40px;
            padding: 16px 20px;
            font-size: 17px;
            color: var(--text-primary);
            outline: none;
        }
        .input-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* Окно выбора треков */
        .track-selector-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            z-index: 1100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .track-selector-modal.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .selector-panel {
            background: var(--container-bg);
            width: 90%;
            max-width: 500px;
            max-height: 70vh;
            border-radius: 36px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .selector-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .selector-header h3 {
            color: var(--text-primary);
            font-size: 20px;
        }
        .selector-list {
            overflow-y: auto;
            max-height: 50vh;
        }
        .selector-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--card-bg);
            border-radius: 20px;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-size: 16px;
        }
        /* Кастомный круглый чекбокс */
        .selector-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: transparent;
            cursor: pointer;
            transition: 0.1s;
            flex-shrink: 0;
        }
        .selector-item input[type="checkbox"]:checked {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: inset 0 0 0 4px var(--container-bg);
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="player-container">
    <!-- Хедер -->
    <div class="header">
        <div class="theme-toggle" id="theme-toggle"><i class="fas fa-sun"></i></div>
        <h1>Пупок FM</h1>
        <label for="file-input" class="upload-btn"><i class="fas fa-plus"></i></label>
        <input type="file" id="file-input" accept=".mp3,.flac,audio/mpeg,audio/flac" multiple>
    </div>

    <!-- Поиск + кнопки управления -->
    <div class="search-row">
        <div class="search-panel">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Поиск (0)" autocomplete="off">
        </div>
        <div class="playback-controls">
            <div class="control-btn" id="playlists-btn" title="Плейлисты"><i class="fas fa-folder-open"></i></div>
            <div class="control-btn" id="autoplay-btn" title="Автовоспроизведение"><i class="fas fa-play-circle"></i></div>
            <div class="control-btn" id="repeat-btn" title="Режим повтора"><i class="fas fa-repeat"></i></div>
        </div>
    </div>

    <!-- Основная панель треков -->
    <div class="playlist-panel">
        <div class="playlist-content" id="playlist-content">
            <div id="playlist"></div>
            <div id="empty-message" class="empty-message">🎵 Плейлист пуст</div>
        </div>
    </div>
</div>

<!-- Модальное окно плейлистов -->
<div class="playlists-modal" id="playlists-modal">
    <div class="playlists-panel" id="playlists-panel"></div>
</div>

<!-- Модалка ввода текста -->
<div class="input-modal" id="input-modal">
    <div class="input-panel">
        <input type="text" id="modal-input-field" placeholder="Название">
        <div class="input-actions">
            <button class="icon-btn" id="modal-cancel"><i class="fas fa-times"></i></button>
            <button class="icon-btn" id="modal-ok"><i class="fas fa-check"></i></button>
        </div>
    </div>
</div>

<!-- Модалка выбора треков -->
<div class="track-selector-modal" id="track-selector-modal">
    <div class="selector-panel">
        <div class="selector-header">
            <h3>Выберите треки</h3>
            <div style="display: flex; gap: 10px;">
                <button class="icon-btn" id="selector-cancel"><i class="fas fa-times"></i></button>
                <button class="icon-btn" id="selector-confirm"><i class="fas fa-check"></i></button>
            </div>
        </div>
        <div class="selector-list" id="selector-list"></div>
    </div>
</div>

<audio id="global-audio" style="display: none;"></audio>

<script>
    (function(){
        "use strict";

        // ---------- SERVICE WORKER ----------
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(console.error);
            });
        }

        // ---------- БАЗА ДАННЫХ ----------
        const DB_NAME = 'PupokFMDB';
        const DB_VERSION = 3;
        let db = null;

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => { db = request.result; resolve(db); };
                request.onupgradeneeded = (evt) => {
                    const db = evt.target.result;
                    if (!db.objectStoreNames.contains('tracks')) {
                        db.createObjectStore('tracks', { keyPath: 'id' });
                    }
                    if (!db.objectStoreNames.contains('playlists')) {
                        const plStore = db.createObjectStore('playlists', { keyPath: 'id' });
                        plStore.createIndex('by_name', 'name');
                    }
                    if (!db.objectStoreNames.contains('playlistTracks')) {
                        const ptStore = db.createObjectStore('playlistTracks', { keyPath: 'id', autoIncrement: true });
                        ptStore.createIndex('playlistId', 'playlistId');
                        ptStore.createIndex('trackId', 'trackId');
                    }
                };
            });
        }

        // ---------- ТЕМА ----------
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = themeToggle.querySelector('i');
        let currentTheme = localStorage.getItem('pupokTheme') || 'system';
        function applyTheme() {
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            let isDark = currentTheme === 'dark' || (currentTheme === 'system' && systemDark);
            document.body.classList.toggle('dark', isDark);
            themeIcon.className = currentTheme === 'light' ? 'fas fa-sun' : (currentTheme === 'dark' ? 'fas fa-moon' : 'fas fa-circle-half-stroke');
            document.getElementById('theme-color-meta').setAttribute('content', isDark ? '#1e1028' : '#b8a9d2');
        }
        themeToggle.addEventListener('click', () => {
            if (currentTheme === 'light') currentTheme = 'dark';
            else if (currentTheme === 'dark') currentTheme = 'system';
            else currentTheme = 'light';
            localStorage.setItem('pupokTheme', currentTheme);
            applyTheme();
        });
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);

        // ---------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------
        const audio = document.getElementById('global-audio');
        const playlistEl = document.getElementById('playlist');
        const emptyMsg = document.getElementById('empty-message');
        const fileInput = document.getElementById('file-input');
        const searchInput = document.getElementById('search-input');
        const autoplayBtn = document.getElementById('autoplay-btn');
        const repeatBtn = document.getElementById('repeat-btn');
        const playlistsBtn = document.getElementById('playlists-btn');
        const modal = document.getElementById('playlists-modal');
        const panelContainer = document.getElementById('playlists-panel');
        const selectorModal = document.getElementById('track-selector-modal');
        const selectorList = document.getElementById('selector-list');
        const selectorCancel = document.getElementById('selector-cancel');
        const selectorConfirm = document.getElementById('selector-confirm');
        const inputModal = document.getElementById('input-modal');
        const modalInput = document.getElementById('modal-input-field');
        const modalOk = document.getElementById('modal-ok');
        const modalCancel = document.getElementById('modal-cancel');

        let autoplayEnabled = localStorage.getItem('autoplay') === 'true';
        let repeatMode = parseInt(localStorage.getItem('repeatMode') || '0');
        const tracksMap = new Map(); // id -> { element, name, blob, objectURL, duration, slider, fillEl, playBtn }
        let activeTrackId = null;
        let currentPlaylistId = null;
        let pendingAddToPlaylistId = null;
        let modalResolve = null;

        // Кастомный prompt
        function showInputModal(placeholder, defaultValue = '') {
            return new Promise((resolve) => {
                modalInput.value = defaultValue;
                modalInput.placeholder = placeholder;
                inputModal.classList.add('visible');
                modalResolve = resolve;
                modalInput.focus();
            });
        }
        modalOk.addEventListener('click', () => {
            if (modalResolve) { modalResolve(modalInput.value); modalResolve = null; }
            inputModal.classList.remove('visible');
        });
        modalCancel.addEventListener('click', () => {
            if (modalResolve) { modalResolve(null); modalResolve = null; }
            inputModal.classList.remove('visible');
        });
        inputModal.addEventListener('click', (e) => { if (e.target === inputModal) { modalCancel.click(); } });

        // ---------- ФУНКЦИИ ПЛЕЕРА ----------
        function updateEmptyMessage() { 
            emptyMsg.style.display = playlistEl.children.length ? 'none' : 'block'; 
            updateSearchPlaceholder();
        }
        function updateSearchPlaceholder() {
            const total = playlistEl.children.length;
            searchInput.placeholder = `Поиск (${total})`;
        }
        function updatePlayButton(id, isPlaying) {
            const t = tracksMap.get(id); if(!t) return;
            t.playBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
            t.playBtn.classList.toggle('playing', isPlaying);
        }
        function updateSliderFill(slider, fillEl, value, max) {
            if (!fillEl) return;
            const percent = max > 0 ? (value / max) * 100 : 0;
            fillEl.style.width = percent + '%';
            slider.value = value;
        }

        audio.addEventListener('timeupdate', () => {
            if (!activeTrackId) return;
            const track = tracksMap.get(activeTrackId);
            if (!track) return;
            const current = audio.currentTime;
            const duration = audio.duration || track.duration;
            updateSliderFill(track.slider, track.fillEl, current, duration);
            if (!isNaN(duration) && duration > 0) track.slider.max = Math.floor(duration);
        });

        audio.addEventListener('ended', () => {
            if (!activeTrackId) return;
            if (repeatMode === 2) { audio.currentTime = 0; audio.play().catch(()=>{}); return; }
            const track = tracksMap.get(activeTrackId);
            track.slider.value = 0;
            updateSliderFill(track.slider, track.fillEl, 0, track.slider.max);
            updatePlayButton(activeTrackId, false);
            if (autoplayEnabled) {
                const nextId = getNextVisibleTrack(activeTrackId);
                if (nextId) activateTrack(nextId, true);
            }
        });

        function getNextVisibleTrack(currentId) {
            const items = Array.from(playlistEl.children).filter(el => el.style.display !== 'none');
            const idx = items.findIndex(el => el.dataset.id === currentId);
            if (idx === -1) return null;
            let next = idx + 1;
            if (next >= items.length) next = repeatMode === 1 ? 0 : -1;
            return next >= 0 ? items[next]?.dataset.id : null;
        }

        function activateTrack(id, autoPlay = true) {
            const track = tracksMap.get(id);
            if (!track) return;
            if (activeTrackId === id) { if (autoPlay && audio.paused) audio.play().catch(()=>{}); return; }
            if (activeTrackId) {
                const prev = tracksMap.get(activeTrackId);
                if (prev) { prev.slider.value = 0; updateSliderFill(prev.slider, prev.fillEl, 0, prev.slider.max); updatePlayButton(activeTrackId, false); }
            }
            audio.src = track.objectURL;
            audio.load();
            audio.currentTime = 0;
            activeTrackId = id;
            if (track.duration) track.slider.max = Math.floor(track.duration);
            audio.addEventListener('loadedmetadata', function onMeta() {
                const dur = audio.duration;
                if (dur && !isNaN(dur)) { track.duration = dur; track.slider.max = Math.floor(dur); }
                audio.removeEventListener('loadedmetadata', onMeta);
            });
            track.slider.value = 0;
            updateSliderFill(track.slider, track.fillEl, 0, track.slider.max);
            if (autoPlay) { audio.play().catch(()=>{}); updatePlayButton(id, true); }
            else updatePlayButton(id, false);
        }

        function togglePlay(id) {
            const track = tracksMap.get(id); if(!track) return;
            if (activeTrackId !== id) activateTrack(id, true);
            else { if(audio.paused) { audio.play(); updatePlayButton(id, true); } else { audio.pause(); updatePlayButton(id, false); } }
        }

        async function deleteTrack(id) {
            const track = tracksMap.get(id); if(!track) return;
            if (activeTrackId === id) { audio.pause(); audio.src = ''; activeTrackId = null; }
            await deleteTrackFromDB(id);
            URL.revokeObjectURL(track.objectURL);
            track.element.remove();
            tracksMap.delete(id);
            updateEmptyMessage();
            filterTracks();
            await removeTrackFromAllPlaylists(id);
        }

        // ---------- БД треки ----------
        async function addTrackToDB(track) { await openDB(); return new Promise((res,rej)=>{ const tx = db.transaction('tracks','readwrite'); const r = tx.objectStore('tracks').put(track); r.onsuccess=res; r.onerror=rej; }); }
        async function getAllTracksFromDB() { await openDB(); return new Promise((res,rej)=>{ const tx = db.transaction('tracks'); const r = tx.objectStore('tracks').getAll(); r.onsuccess=()=>res(r.result); r.onerror=rej; }); }
        async function deleteTrackFromDB(id) { await openDB(); return new Promise((res,rej)=>{ const tx = db.transaction('tracks','readwrite'); const r = tx.objectStore('tracks').delete(id); r.onsuccess=res; r.onerror=rej; }); }

        // ---------- UI ТРЕКОВ ----------
        function createTrackElement(track) {
            const item = document.createElement('div'); item.className = 'track-item'; item.dataset.id = track.id;
            const row = document.createElement('div'); row.className = 'track-row';
            const actionLeft = document.createElement('div'); actionLeft.className = 'action-left';
            const deleteBtn = document.createElement('div'); deleteBtn.className = 'delete-btn'; deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
            deleteBtn.addEventListener('click', (e)=>{ e.stopPropagation(); showDeleteConfirmation(track.id); });
            actionLeft.appendChild(deleteBtn);
            const infoDiv = document.createElement('div'); infoDiv.className = 'track-info';
            const nameDiv = document.createElement('div'); nameDiv.className = 'track-name'; nameDiv.textContent = track.name;
            
            const progressContainer = document.createElement('div'); progressContainer.className = 'progress-container';
            const trackBg = document.createElement('div'); trackBg.className = 'progress-track-bg';
            const fill = document.createElement('div'); fill.className = 'progress-fill';
            const slider = document.createElement('input'); slider.type = 'range'; slider.className = 'progress-slider'; slider.min = 0; slider.max = track.duration||0; slider.value=0; slider.step=0.1;
            progressContainer.appendChild(trackBg);
            progressContainer.appendChild(fill);
            progressContainer.appendChild(slider);
            
            infoDiv.appendChild(nameDiv);
            infoDiv.appendChild(progressContainer);
            const playBtn = document.createElement('div'); playBtn.className = 'play-pause-btn'; playBtn.innerHTML = '<i class="fas fa-play"></i>';
            row.appendChild(actionLeft); row.appendChild(infoDiv); row.appendChild(playBtn);
            item.appendChild(row);
            return { item, deleteBtn, playBtn, slider, fillEl: fill };
        }

        function addTrackToUI(track) {
            const { item, playBtn, slider, fillEl } = createTrackElement(track);
            playlistEl.appendChild(item);
            tracksMap.set(track.id, { element: item, name: track.name, blob: track.blob, objectURL: URL.createObjectURL(track.blob), duration: track.duration, slider, fillEl, playBtn });
            playBtn.addEventListener('click', ()=> togglePlay(track.id));
            slider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                updateSliderFill(slider, fillEl, val, slider.max);
                if (activeTrackId === track.id) audio.currentTime = val;
                else { activateTrack(track.id, false); audio.currentTime = val; updatePlayButton(track.id, false); }
            });
            updatePlayButton(track.id, false);
            updateSliderFill(slider, fillEl, 0, slider.max);
            updateEmptyMessage();
            filterTracks();
        }

        function filterTracks() {
            const q = searchInput.value.trim().toLowerCase();
            let visibleCount = 0;
            tracksMap.forEach((t) => {
                const match = !q || t.name.toLowerCase().includes(q);
                t.element.style.display = match ? 'block' : 'none';
                if (match) visibleCount++;
            });
            searchInput.placeholder = `Поиск (${visibleCount})`;
        }
        searchInput.addEventListener('input', filterTracks);

        fileInput.addEventListener('change', async (e) => {
            for (const file of Array.from(e.target.files)) {
                if (!file.type.startsWith('audio/') && !file.name.match(/\.(mp3|flac)$/i)) { alert(`Не аудио: ${file.name}`); continue; }
                let duration; try { duration = await getAudioDuration(file); } catch { duration = null; }
                if (!duration) { alert(`Ошибка чтения: ${file.name}`); continue; }
                const id = crypto.randomUUID ? crypto.randomUUID() : Date.now()+'-'+Math.random().toString(36);
                const track = { id, name: file.name, blob: file, duration };
                await addTrackToDB(track);
                addTrackToUI(track);
            }
            fileInput.value = '';
        });
        function getAudioDuration(blob) {
            return new Promise((resolve) => {
                const url = URL.createObjectURL(blob); const a = new Audio(url);
                a.addEventListener('loadedmetadata', ()=>{ resolve(a.duration); URL.revokeObjectURL(url); });
                a.addEventListener('error', ()=>{ resolve(null); URL.revokeObjectURL(url); });
            });
        }

        // ---------- ПЛЕЙЛИСТЫ БД ----------
        async function createPlaylist(name) {
            await openDB();
            const id = crypto.randomUUID ? crypto.randomUUID() : Date.now()+'-'+Math.random().toString(36);
            const playlist = { id, name };
            return new Promise((res,rej)=>{ const tx = db.transaction('playlists','readwrite'); const r = tx.objectStore('playlists').add(playlist); r.onsuccess=()=>res(id); r.onerror=rej; });
        }
        async function getAllPlaylists() {
            await openDB();
            return new Promise((res,rej)=>{ const tx = db.transaction('playlists'); const r = tx.objectStore('playlists').getAll(); r.onsuccess=()=>res(r.result); r.onerror=rej; });
        }
        async function updatePlaylist(id, name) {
            await openDB();
            return new Promise((res,rej)=>{ const tx = db.transaction('playlists','readwrite'); const store = tx.objectStore('playlists'); const get = store.get(id); get.onsuccess=()=>{ const pl = get.result; pl.name = name; store.put(pl).onsuccess=res; }; get.onerror=rej; });
        }
        async function deletePlaylist(id) {
            await openDB();
            await new Promise((res,rej)=>{ const tx = db.transaction('playlistTracks','readwrite'); const index = tx.objectStore('playlistTracks').index('playlistId'); const r = index.openCursor(IDBKeyRange.only(id)); r.onsuccess=(e)=>{ const cursor=e.target.result; if(cursor){ cursor.delete(); cursor.continue(); } else res(); }; r.onerror=rej; });
            return new Promise((res,rej)=>{ const tx = db.transaction('playlists','readwrite'); tx.objectStore('playlists').delete(id).onsuccess=res; });
        }
        async function addTracksToPlaylist(playlistId, trackIds) {
            await openDB();
            const tx = db.transaction('playlistTracks','readwrite');
            const store = tx.objectStore('playlistTracks');
            for (const tid of trackIds) { store.add({ playlistId, trackId: tid }); }
            return new Promise((res,rej)=>{ tx.oncomplete=res; tx.onerror=rej; });
        }
        async function getPlaylistTracks(playlistId) {
            await openDB();
            return new Promise((res,rej)=>{ const tx = db.transaction('playlistTracks'); const index = tx.objectStore('playlistTracks').index('playlistId'); const r = index.getAll(playlistId); r.onsuccess=()=>res(r.result.map(i=>i.trackId)); r.onerror=rej; });
        }
        async function removeTrackFromPlaylist(playlistId, trackId) {
            await openDB();
            return new Promise((res,rej)=>{ const tx = db.transaction('playlistTracks','readwrite'); const index = tx.objectStore('playlistTracks').index('playlistId'); const r = index.openCursor(IDBKeyRange.only(playlistId)); r.onsuccess=(e)=>{ const c=e.target.result; if(c){ if(c.value.trackId===trackId) c.delete(); c.continue(); } else res(); }; r.onerror=rej; });
        }
        async function removeTrackFromAllPlaylists(trackId) {
            await openDB();
            return new Promise((res)=>{ const tx = db.transaction('playlistTracks','readwrite'); const store = tx.objectStore('playlistTracks'); const index = store.index('trackId'); const r = index.openCursor(IDBKeyRange.only(trackId)); r.onsuccess=(e)=>{ const c=e.target.result; if(c){ c.delete(); c.continue(); } else res(); }; });
        }

        // ---------- МОДАЛКА ПЛЕЙЛИСТОВ ----------
        function showPlaylistsModal() {
            renderPlaylistsList();
            modal.classList.add('visible');
        }
        function hidePlaylistsModal() { modal.classList.remove('visible'); }

        function renderPlaylistsList() {
            panelContainer.innerHTML = `
                <div class="panel-header">
                    <h2>Плейлисты</h2>
                    <button class="close-panel-btn" id="close-modal-btn"><i class="fas fa-times"></i></button>
                </div>
                <div class="playlist-search"><i class="fas fa-search"></i><input type="text" id="playlist-search-input" placeholder="Поиск (0)"></div>
                <button class="create-playlist-btn" id="create-playlist-btn"><i class="fas fa-plus-circle"></i> Новый плейлист</button>
                <div class="playlist-list" id="playlist-list-container"></div>
            `;
            document.getElementById('close-modal-btn').addEventListener('click', hidePlaylistsModal);
            document.getElementById('create-playlist-btn').addEventListener('click', async ()=>{
                const name = await showInputModal('Название плейлиста');
                if (name) { await createPlaylist(name); renderPlaylistsList(); }
            });
            const searchInput = document.getElementById('playlist-search-input');
            searchInput.addEventListener('input', filterPlaylists);
            loadPlaylistsToContainer();
        }

        async function loadPlaylistsToContainer() {
            const container = document.getElementById('playlist-list-container');
            const playlists = await getAllPlaylists();
            const q = document.getElementById('playlist-search-input')?.value.toLowerCase() || '';
            const filtered = playlists.filter(p=>p.name.toLowerCase().includes(q));
            document.getElementById('playlist-search-input').placeholder = `Поиск (${filtered.length})`;
            container.innerHTML = filtered.map(p=>`
                <div class="playlist-item" data-id="${p.id}">
                    <div class="playlist-info">${p.name}</div>
                    <div class="playlist-actions" id="actions-${p.id}">
                        <button class="icon-btn edit-playlist-btn" data-id="${p.id}"><i class="fas fa-pencil-alt"></i></button>
                        <button class="icon-btn delete-playlist-btn" data-id="${p.id}"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `).join('');
            container.querySelectorAll('.playlist-item').forEach(el=>{
                el.addEventListener('click', (e)=>{
                    if(e.target.closest('button')) return;
                    openPlaylistDetail(el.dataset.id);
                });
            });
            container.querySelectorAll('.edit-playlist-btn').forEach(b=>b.addEventListener('click', async (e)=>{
                e.stopPropagation();
                const id = b.dataset.id;
                const pl = (await getAllPlaylists()).find(p=>p.id===id);
                const newName = await showInputModal('Новое название', pl?.name);
                if (newName) { await updatePlaylist(id, newName); renderPlaylistsList(); }
            }));
            container.querySelectorAll('.delete-playlist-btn').forEach(b=>b.addEventListener('click', (e)=>{
                e.stopPropagation();
                const id = b.dataset.id;
                const actionsDiv = document.getElementById(`actions-${id}`);
                actionsDiv.innerHTML = `
                    <button class="icon-btn confirm-delete-btn" data-id="${id}"><i class="fas fa-check"></i></button>
                    <button class="icon-btn cancel-delete-btn" data-id="${id}"><i class="fas fa-times"></i></button>
                `;
                actionsDiv.querySelector('.confirm-delete-btn').addEventListener('click', async (ev)=>{
                    ev.stopPropagation();
                    await deletePlaylist(id);
                    renderPlaylistsList();
                });
                actionsDiv.querySelector('.cancel-delete-btn').addEventListener('click', (ev)=>{
                    ev.stopPropagation();
                    renderPlaylistsList();
                });
            }));
        }
        function filterPlaylists() { loadPlaylistsToContainer(); }

        function openPlaylistDetail(playlistId) {
            currentPlaylistId = playlistId;
            renderPlaylistDetail();
        }

        async function renderPlaylistDetail() {
            const playlist = (await getAllPlaylists()).find(p=>p.id===currentPlaylistId);
            panelContainer.innerHTML = `
                <div class="panel-header">
                    <h2>${playlist.name}</h2>
                    <button class="close-panel-btn" id="back-from-detail"><i class="fas fa-times"></i></button>
                </div>
                <div class="detail-search-row">
                    <div class="playlist-search"><i class="fas fa-search"></i><input type="text" id="detail-search" placeholder="Поиск (0)"></div>
                    <div class="playback-controls">
                        <div class="control-btn" id="detail-autoplay-btn" title="Автовоспроизведение"><i class="fas fa-play-circle"></i></div>
                        <div class="control-btn" id="detail-repeat-btn" title="Режим повтора"><i class="fas fa-repeat"></i></div>
                    </div>
                </div>
                <button class="add-tracks-btn" id="add-tracks-to-playlist"><i class="fas fa-plus"></i> Добавить треки</button>
                <div class="playlist-tracks-panel">
                    <div class="playlist-content" id="playlist-tracks-container"></div>
                </div>
            `;
            document.getElementById('back-from-detail').addEventListener('click', ()=>{
                renderPlaylistsList();
            });
            const detailAutoplay = document.getElementById('detail-autoplay-btn');
            const detailRepeat = document.getElementById('detail-repeat-btn');
            const updateDetailControls = () => {
                detailAutoplay.classList.toggle('active', autoplayEnabled);
                detailRepeat.classList.toggle('active', repeatMode === 1 || repeatMode === 2);
                detailRepeat.classList.toggle('repeat-one', repeatMode === 2);
            };
            updateDetailControls();
            detailAutoplay.addEventListener('click', ()=>{
                autoplayEnabled = !autoplayEnabled;
                localStorage.setItem('autoplay', autoplayEnabled);
                autoplayBtn.classList.toggle('active', autoplayEnabled);
                updateDetailControls();
            });
            detailRepeat.addEventListener('click', ()=>{
                repeatMode = (repeatMode+1)%3;
                localStorage.setItem('repeatMode', repeatMode);
                updateRepeatButton();
                updateDetailControls();
            });

            document.getElementById('add-tracks-to-playlist').addEventListener('click', ()=>{
                pendingAddToPlaylistId = currentPlaylistId;
                showTrackSelector();
            });
            const searchInput = document.getElementById('detail-search');
            searchInput.addEventListener('input', ()=> loadPlaylistTracks(currentPlaylistId, searchInput.value));
            await loadPlaylistTracks(currentPlaylistId);
        }

        async function loadPlaylistTracks(playlistId, filterText = '') {
            const container = document.getElementById('playlist-tracks-container');
            const trackIds = await getPlaylistTracks(playlistId);
            const allTracks = await getAllTracksFromDB();
            const tracks = allTracks.filter(t=>trackIds.includes(t.id) && (!filterText || t.name.toLowerCase().includes(filterText.toLowerCase())));
            document.getElementById('detail-search').placeholder = `Поиск (${tracks.length})`;
            container.innerHTML = tracks.map(t=> {
                const isActive = (activeTrackId === t.id);
                const currentTime = isActive ? audio.currentTime : 0;
                const duration = t.duration || 0;
                const fillPercent = duration > 0 ? (currentTime / duration) * 100 : 0;
                return `
                <div class="track-item" data-id="${t.id}">
                    <div class="track-row">
                        <div class="action-left" id="action-${t.id}">
                            <div class="delete-btn" data-id="${t.id}"><i class="fas fa-trash-alt"></i></div>
                        </div>
                        <div class="track-info">
                            <div class="track-name">${t.name}</div>
                            <div class="progress-container">
                                <div class="progress-track-bg"></div>
                                <div class="progress-fill" style="width: ${fillPercent}%;"></div>
                                <input type="range" class="progress-slider" min="0" max="${duration}" value="${currentTime}" step="0.1" data-id="${t.id}">
                            </div>
                        </div>
                        <div class="play-pause-btn ${isActive && !audio.paused ? 'playing' : ''}" data-id="${t.id}">${isActive && !audio.paused ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>'}</div>
                    </div>
                </div>
            `}).join('');
            
            container.querySelectorAll('.delete-btn').forEach(b=>b.addEventListener('click', (e)=>{
                e.stopPropagation();
                const tid = b.dataset.id;
                const actionDiv = document.getElementById(`action-${tid}`);
                actionDiv.innerHTML = `
                    <div class="confirm-btn" data-id="${tid}"><i class="fas fa-check"></i></div>
                    <div class="cancel-btn" data-id="${tid}"><i class="fas fa-times"></i></div>
                `;
                actionDiv.querySelector('.confirm-btn').addEventListener('click', async (ev)=>{
                    ev.stopPropagation();
                    await removeTrackFromPlaylist(playlistId, tid);
                    loadPlaylistTracks(playlistId, document.getElementById('detail-search').value);
                });
                actionDiv.querySelector('.cancel-btn').addEventListener('click', (ev)=>{
                    ev.stopPropagation();
                    loadPlaylistTracks(playlistId, document.getElementById('detail-search').value);
                });
            }));
            
            container.querySelectorAll('.play-pause-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tid = btn.dataset.id;
                    let track = tracksMap.get(tid);
                    if (!track) {
                        const tData = allTracks.find(t=>t.id===tid);
                        if (tData) { addTrackToUI(tData); track = tracksMap.get(tid); }
                    }
                    if (track) togglePlay(tid);
                    setTimeout(() => loadPlaylistTracks(playlistId, document.getElementById('detail-search').value), 50);
                });
            });
            
            container.querySelectorAll('.progress-slider').forEach(slider => {
                const tid = slider.dataset.id;
                const fill = slider.parentElement.querySelector('.progress-fill');
                const track = tracksMap.get(tid);
                slider.addEventListener('input', (e) => {
                    const val = parseFloat(e.target.value);
                    fill.style.width = (val / slider.max * 100) + '%';
                    if (activeTrackId === tid) audio.currentTime = val;
                    else if (track) { activateTrack(tid, false); audio.currentTime = val; updatePlayButton(tid, false); }
                });
            });
        }

        // Выбор треков
        function showTrackSelector() {
            selectorModal.classList.add('visible');
            renderSelectorList();
        }
        async function renderSelectorList() {
            const tracks = await getAllTracksFromDB();
            selectorList.innerHTML = tracks.map(t=>`
                <div class="selector-item">
                    <input type="checkbox" value="${t.id}" id="chk_${t.id}">
                    <label for="chk_${t.id}">${t.name}</label>
                </div>
            `).join('');
        }
        selectorCancel.addEventListener('click', ()=>{
            selectorModal.classList.remove('visible');
            selectorList.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
        });
        selectorConfirm.addEventListener('click', async ()=>{
            const checked = [...selectorList.querySelectorAll('input:checked')].map(cb=>cb.value);
            if(pendingAddToPlaylistId && checked.length) {
                await addTracksToPlaylist(pendingAddToPlaylistId, checked);
                if(currentPlaylistId === pendingAddToPlaylistId) await loadPlaylistTracks(currentPlaylistId);
            }
            selectorModal.classList.remove('visible');
            selectorList.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
            pendingAddToPlaylistId = null;
        });

        // Кнопки управления плеером
        autoplayBtn.addEventListener('click', ()=>{ autoplayEnabled=!autoplayEnabled; localStorage.setItem('autoplay', autoplayEnabled); autoplayBtn.classList.toggle('active', autoplayEnabled); });
        repeatBtn.addEventListener('click', ()=>{ repeatMode=(repeatMode+1)%3; localStorage.setItem('repeatMode', repeatMode); updateRepeatButton(); });
        function updateRepeatButton() {
            repeatBtn.classList.remove('active','repeat-one');
            if (repeatMode === 1 || repeatMode === 2) repeatBtn.classList.add('active');
            if (repeatMode === 2) repeatBtn.classList.add('repeat-one');
        }
        updateRepeatButton();
        autoplayBtn.classList.toggle('active', autoplayEnabled);

        playlistsBtn.addEventListener('click', showPlaylistsModal);
        modal.addEventListener('click', (e)=>{ if(e.target===modal) hidePlaylistsModal(); });

        // Загрузка данных
        (async function init(){
            await openDB();
            applyTheme();
            const tracks = await getAllTracksFromDB();
            tracks.forEach(t=>addTrackToUI(t));
            updateSearchPlaceholder();
        })();

        function showDeleteConfirmation(id) {
            const track = tracksMap.get(id); if(!track) return;
            const left = track.element.querySelector('.action-left');
            left.innerHTML = `<div class="confirm-btn"><i class="fas fa-check"></i></div><div class="cancel-btn"><i class="fas fa-times"></i></div>`;
            left.querySelector('.confirm-btn').addEventListener('click', (e)=>{ e.stopPropagation(); deleteTrack(id); });
            left.querySelector('.cancel-btn').addEventListener('click', (e)=>{ e.stopPropagation(); left.innerHTML = `<div class="delete-btn"><i class="fas fa-trash-alt"></i></div>`; left.querySelector('.delete-btn').addEventListener('click', (e2)=>{ e2.stopPropagation(); showDeleteConfirmation(id); }); });
        }
    })();
</script>
</body>
</html>
